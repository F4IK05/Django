<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Магазин{% endblock %}</title>

    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            margin: 0;
        }

        .container {
            width: 800px;
            margin: 30px auto;
        }

        .card {
            background: white;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 10px;
        }

        a {
            text-decoration: none;
            color: black;
        }
    </style>
</head>
<body>

<div class="container">
    <h1><a href="/">Отзывы о продуктах</a></h1>

    {% block content %}
    {% endblock %}
</div>

</body>
</html>
