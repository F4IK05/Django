<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Sport{% endblock %}</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
          font-family: 'Segoe UI', Arial, sans-serif;
          background: #f4f6f9;
          color: #1a1a2e;
          min-height: 100vh;
        }

        header {
          background: #000;
          padding: 0 2rem;
          display: flex;
          align-items: center;
          justify-content: space-between;
          height: 64px;
        }

        .logo {
          height: 40px;
          width: auto;
          display: block;
        }

        nav ul {
          list-style: none;
          display: flex;
          gap: .25rem;
        }

        nav a {
          display: flex;
          align-items: center;
          gap: 6px;
          padding: .45rem 1rem;
          color: #fff;
          text-decoration: none;
          font-size: .92rem;
          font-weight: 500;
          transition: background .18s, color .18s;
        }

        nav a:hover { background: #7878; }
        nav a.active { border-bottom: 2px solid #fff; ;color: #fff; }

        main {
          max-width: 1100px;
          margin: 2.5rem auto;
          padding: 0 1.5rem;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
