{% extends "main/base.html" %}

{% block title %}Удаление{% endblock %}

{% block content %}

<h2>Удалить фильм</h2>

<p>Ты уверен, что хочешь удалить "<strong>{{ movie.title }}</strong>"?</p>

<form method="post">
    {% csrf_token %}
    <button class="btn btn-danger">Да, удалить</button>
    <a href="{% url 'movie_list' %}" class="btn btn-secondary">Отмена</a>
</form>

{% endblock %}
