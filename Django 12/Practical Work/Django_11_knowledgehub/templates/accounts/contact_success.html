{% extends "base.html" %}

{% block title %}
    Knowledge Hub - Message Sent
{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-7 col-lg-6">

            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-body p-5 text-center">

                    <h1 class="fw-bold text-success mb-4">
                        Message Sent Successfully 📩
                    </h1>

                    <p class="fs-5 mb-4">
                        Thank you, <strong>{{ name }}</strong>! Your message has been received.
                    </p>

                    <div class="d-grid gap-3">
                        <a href="/accounts/dashboard/" class="btn btn-primary py-2 fw-bold">
                            Back to Dashboard
                        </a>

                        <a href="/" class="btn btn-outline-secondary py-2">
                            Return to Home Page
                        </a>
                    </div>

                </div>
            </div>

        </div>
    </div>
</div>
{% endblock %}
