{% extends "main/base.html" %}
{% block title %}Редактирование статьи{% endblock %}
{% block content %}
<div class="max-w-4xl mx-auto rounded-xl shadow-sm bg-white border border-gray-200 p-8 text-black mt-8">

    <h1 class="text-2xl font-bold mb-2">Редактирование: {{ article.title }}</h1>

    <form method="POST" class="space-y-6">
        {% csrf_token %}
        {{ form.media }}

        <div>{{ form.title }}</div>

        <div class="mt-8">
            <label class="block text-sm font-medium text-gray-700 mb-2">Текст статьи</label>
            {{ form.content }}
        </div>

        <div class="flex gap-3">
            <button type="submit"
                    class="flex-1 bg-black text-white px-6 py-3 rounded-lg font-medium hover:bg-gray-800 transition">
                Далее →
            </button>
            <a href="{% url 'article_detail' id=article.pk %}"
               class="flex-1 text-center border border-gray-200 text-gray-600 px-6 py-3 rounded-lg font-medium hover:bg-gray-50 transition">
                Отмена
            </a>
        </div>
    </form>
</div>

<style>
    [data-editorjs-wrapper] { border: none !important; max-width: 100% !important; width: 100% !important; }
    .ce-block__content, .ce-toolbar__content { max-width: 100% !important; margin: 0 !important; }
    .ce-paragraph[data-placeholder]::before { content: "" !important; }
    .ce-paragraph:empty::before {
        content: "Нажмите ⇥Tab для вызова меню" !important;
        display: block !important;
        width: 100% !important;
        height: 20px !important;
        color: #9ca3af !important;
        pointer-events: none !important;
        position: absolute !important;
    }
    .codex-editor__redactor { min-height: 400px !important; position: relative !important; }
</style>

{% if article.content %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    const savedData = {{ article.content|safe }};
    const interval = setInterval(function() {
        const wrapper = document.querySelector('[data-editorjs-wrapper]');
        if (!wrapper) return;
        if (wrapper.querySelector('.codex-editor')) {
            for (const key in window) {
                try {
                    if (window[key] && window[key].isReady && window[key].render) {
                        window[key].isReady.then(() => {
                            window[key].render(savedData);
                        });
                        clearInterval(interval);
                        return;
                    }
                } catch(e) {}
            }
        }
    }, 200);
    setTimeout(() => clearInterval(interval), 10000);
});
</script>
{% endif %}

{% endblock %}
