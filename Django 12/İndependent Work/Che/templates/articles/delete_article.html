{% extends "main/base.html" %}

{% block title %}Удаление статьи{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-20 text-center">
    <h1 class="text-2xl text-gray-800 font-bold mb-4">Удалить статью?</h1>
    <p class="text-gray-500 mb-8">«{{ article.title }}» будет удалена безвозвратно.</p>
    <div class="flex gap-3 justify-center">
        <form action="{% url 'delete_article' article.pk %}" method="post">
            {% csrf_token %}
            <button type="submit"
                    class="px-6 py-2.5 bg-red-600 text-white rounded-lg text-sm font-medium hover:bg-red-700 transition-colors">
                Удалить
            </button>
        </form>
        <a href="{% url 'article_detail' id=article.pk %}"
           class="px-6 py-2.5 border border-gray-200 text-gray-600 rounded-lg text-sm font-medium hover:bg-gray-50 transition-colors">
            Отмена
        </a>
    </div>
</div>
{% endblock %}
