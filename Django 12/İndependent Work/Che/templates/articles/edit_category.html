{% extends "main/base.html" %}
{% block title %}Редактирование категории{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-8">
    <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-8">
        <h1 class="text-xl text-gray-800 font-bold mb-1">Редактирование категории</h1>
        <p class="text-xs text-gray-400 mb-6">Slug: <code class="bg-gray-100 px-1 rounded">{{ category.slug }}</code> — не изменяется</p>

        <form method="POST" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">Название</label>
                <input type="text" name="name" value="{{ category.name }}"
                       class="w-full text-gray-800 border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-black transition-all"
                       required>
            </div>
            <div class="flex gap-3 pt-2">
                <button type="submit"
                        class="flex-1 bg-black text-white py-2.5 rounded-lg text-sm font-medium hover:bg-gray-800 transition-colors">
                    Сохранить
                </button>
                <a href="{% url 'accounts:admin_panel' %}"
                   class="flex-1 text-center border border-gray-200 text-gray-600 py-2.5 rounded-lg text-sm font-medium hover:bg-gray-50 transition-colors">
                    Отмена
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
