{% extends "main/base.html" %}

{% block title %}{{ article.title }}{% endblock %}

{% block content %}

<div class="max-w-3xl mx-auto">

    <p class="text-sm mb-3">
        <span class="text-black font-semibold">{{ article.author }}</span> <span class="text-gray-400">{{ article.created_at|timesince }}</span>
    </p>

    <h1 class="text-2xl font-bold mb-2 text-black">
        {{ article.title }}
    </h1>

    <p class="text-xs text-gray-500 mb-2">
        {{ article.category.name }}
    </p>

    {% if article.image %}
        <img src="{{ article.image.url }}" class="rounded-lg mb-6 w-full">
    {% endif %}

    <div class="text-lg text-black space-y-4">
        {{ article.content }}
    </div>

</div>

{% endblock %}
