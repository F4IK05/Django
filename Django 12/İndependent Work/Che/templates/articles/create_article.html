{% extends "main/base.html" %}

{% block title %}Создание статьи{% endblock %}

{% block content %}

<div class="rounded-xl shadow p-6 text-black">

    <h1 class="text-2xl font-bold mb-6">Создание статьи</h1>

    <form method="POST" enctype="multipart/form-data" class="space-y-4">
        {% csrf_token %}

        <div>
            {{ form.title }}
        </div>

        <div>
            <label class="block text-sm font-medium mb-1">Автор</label>
            {{ form.author }}
        </div>

        <div>
            <label class="block text-sm font-medium mb-1">Категория</label>
            {{ form.category }}
        </div>

        <div>
            <label class="block text-sm font-medium mb-1">Картинка</label>
            {{ form.image }}
        </div>

        <div>
            <label class="block text-sm font-medium mb-1">Текст статьи</label>
            {{ form.content }}
        </div>

        <button type="submit"
                class="bg-black text-white px-5 py-2 rounded-lg hover:bg-gray-800 transition">
            Опубликовать
        </button>
    </form>

</div>

{% endblock %}
