{% extends "main/base.html" %}

{% block title %}Создание статьи{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto rounded-xl shadow-sm bg-white border border-gray-200 p-8 text-black mt-8">

    <h1 class="text-2xl font-bold mb-8">Создание статьи</h1>

    <form method="POST" enctype="multipart/form-data" class="space-y-6">
        {% csrf_token %}

        {{ form.media }}

        <div>
            {{ form.title }}
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Категория</label>
                {{ form.category }}
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Обложка статьи</label>
                {{ form.image }}
            </div>
        </div>

        <div class="mt-8">
            <label class="block text-sm font-medium text-gray-700 mb-2 z-0">Текст статьи</label>
                {{ form.content }}
        </div>

        <button type="submit"
                class="bg-black text-white px-6 py-3 rounded-lg font-medium hover:bg-gray-800 transition w-full mt-6">
            Опубликовать
        </button>
    </form>

</div>

    <style>
    [data-editorjs-wrapper] { border: none !important; max-width: 100% !important; width: 100% !important; }
    .ce-block__content, .ce-toolbar__content { max-width: 100% !important; margin: 0 !important; }


    .ce-paragraph[data-placeholder]::before {
        content: "" !important;
    }

    .ce-paragraph:empty::before {
        content: "Нажмите ⇥Tab для вызова меню" !important;
        display: block !important;
        width: 100% !important;
        height: 20px !important;
        color: #9ca3af !important; /* Tailwind gray-400 */
        pointer-events: none !important; /* Чтобы не мешал кликать */
        position: absolute !important; /* Чтобы не двигал курсор */
    }



    .codex-editor__redactor {
        min-height: 400px !important;
        position: relative !important; /* Нужно для absolute плейсхолдера */
    }
</style>

{% endblock %}
