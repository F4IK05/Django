{% extends "main/base.html" %}
{% block title %}Настройки статьи{% endblock %}
{% block content %}
<div class="max-w-lg mx-auto mt-8">
    <div class="bg-white rounded border border-gray-200 p-8">
        <h1 class="text-xl text-gray-800 font-bold mb-6">Настройки: {{ article.title }}</h1>

        <form method="POST" enctype="multipart/form-data" class="space-y-6">
            {% csrf_token %}

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">Категория</label>
                {{ form.category }}
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">Обложка</label>
                {% if article.image %}
                    <img src="{{ article.image.url }}" class="w-32 rounded-lg mb-2">
                {% endif %}
                {{ form.image }}
            </div>

            <div class="flex gap-3">
                <a href="{% url 'edit_article_step1' pk=article.pk %}"
                   class="flex-1 text-center border border-gray-200 text-gray-600 py-2.5 rounded-lg text-sm font-medium hover:bg-gray-50 transition-colors">
                    ← Назад
                </a>
                <button type="submit"
                        class="flex-1 bg-black text-white py-2.5 rounded-lg text-sm font-medium hover:bg-gray-800 transition-colors">
                    Сохранить
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
