{% extends "main/base.html" %}

{% block title %}Категории{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto mt-8 pb-16">

    <h1 class="text-xl font-bold text-gray-900 mb-6">Категории</h1>

    <div class="flex flex-wrap gap-2">
        {% for category in categories %}
        <a href="{% url 'category_detail' category.slug %}"
           class="bg-white border border-gray-200 rounded p-5">
            <h2 class="font-semibold text-gray-900 mb-1">{{ category.name }}</h2>
            <p class="text-xs text-gray-400">{{ category.published_count }} статей</p>
        </a>
        {% empty %}
        <p class="text-gray-400 text-sm">Категорий пока нет</p>
        {% endfor %}
    </div>

</div>
{% endblock %}
