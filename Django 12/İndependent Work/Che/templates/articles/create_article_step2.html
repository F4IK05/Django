{% extends "main/base.html" %}
{% block title %}Настройки публикации{% endblock %}
{% block content %}
<div class="max-w-lg mx-auto rounded-xl shadow-sm bg-white border border-gray-200 p-8 text-black mt-8">
    <h1 class="text-xl font-bold mb-6">Настройки публикации</h1>

    <form method="POST" enctype="multipart/form-data" class="space-y-6">
        {% csrf_token %}

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Категория</label>
            {{ form.category }}
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Обложка статьи</label>
            {{ form.image }}
        </div>

        <div class="flex gap-4 mt-8">
            <a href="{% url 'create_article_step1_edit' pk=article.pk %}"
               class="flex-1 text-center border border-gray-300 px-6 py-3 rounded-lg font-medium hover:bg-gray-50 transition">
                Назад
            </a>
            <button type="submit"
                    class="flex-1 bg-black text-white px-6 py-3 rounded-lg font-medium hover:bg-gray-800 transition">
                Опубликовать
            </button>
        </div>
    </form>
</div>
{% endblock %}
